<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLX Architecture Explorer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d2c0;
    --pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .tau-control {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .tau-control label { font-size: 13px; color: var(--text-dim); }
  .tau-control .tau-val {
    font-size: 18px;
    font-weight: 700;
    min-width: 48px;
    text-align: center;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 200px;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .tau-regime {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .regime-fast { background: #3fb95033; color: var(--green); }
  .regime-standard { background: #58a6ff33; color: var(--accent); }
  .regime-deep { background: #d2992233; color: var(--orange); }
  .regime-full { background: #f8514933; color: var(--red); }

  .main-layout {
    display: flex;
    height: calc(100vh - 65px);
  }

  /* Pipeline column */
  .pipeline {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .flow-arrow {
    width: 2px;
    height: 20px;
    background: var(--border);
    position: relative;
  }
  .flow-arrow::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 6px solid var(--border);
  }
  .flow-arrow.active { background: var(--accent); }
  .flow-arrow.active::after { border-top-color: var(--accent); }

  .node {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    min-width: 180px;
    position: relative;
  }
  .node:hover { border-color: var(--accent); transform: translateY(-1px); }
  .node.selected { border-color: var(--accent); box-shadow: 0 0 20px #58a6ff22; }
  .node.inactive { opacity: 0.3; }
  .node.active-glow { border-color: var(--green); box-shadow: 0 0 12px #3fb95033; }
  .node .node-label {
    font-weight: 600;
    font-size: 14px;
  }
  .node .node-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .node .node-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 600;
  }

  /* Cortex row */
  .cortex-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
  }
  .cortex-node {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    min-width: 110px;
    position: relative;
  }
  .cortex-node:hover { border-color: var(--purple); transform: translateY(-1px); }
  .cortex-node.selected { border-color: var(--purple); box-shadow: 0 0 16px #bc8cff22; }
  .cortex-node.inactive { opacity: 0.25; }
  .cortex-node .cortex-name { font-weight: 600; font-size: 13px; }
  .cortex-node .cortex-score {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .strata-bar {
    display: flex;
    gap: 2px;
    margin-top: 6px;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
  }
  .strata-bar .s {
    flex: 1;
    border-radius: 2px;
    transition: opacity 0.3s;
  }
  .s-basic { background: var(--green); }
  .s-intermediate { background: var(--accent); }
  .s-expert { background: var(--orange); }
  .s-frontier { background: var(--red); }

  /* Bridge indicator */
  .bridge-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    font-size: 12px;
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .bridge-row.active-bridge {
    border-color: var(--cyan);
    color: var(--cyan);
    background: #39d2c011;
  }
  .bridge-row.inactive { opacity: 0.2; }

  /* Detail panel */
  .detail-panel {
    width: 380px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    overflow-y: auto;
  }
  .detail-panel h2 {
    font-size: 16px;
    margin-bottom: 4px;
  }
  .detail-panel .detail-type {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .detail-panel p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .detail-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .detail-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px;
  }
  .stat-card .stat-val {
    font-size: 18px;
    font-weight: 700;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .stat-card .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .strata-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stratum-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    background: var(--bg);
    font-size: 12px;
    transition: opacity 0.3s;
  }
  .stratum-row.stratum-inactive { opacity: 0.25; }
  .stratum-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stratum-name { flex: 1; font-weight: 500; }
  .stratum-meta {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Thermal bar */
  .thermal-strip {
    height: 4px;
    background: linear-gradient(90deg, var(--green), var(--accent), var(--orange), var(--red));
    border-radius: 2px;
    margin-top: 4px;
    position: relative;
  }
  .thermal-strip .marker {
    position: absolute;
    top: -4px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--bg);
    transform: translateX(-50%);
    transition: left 0.3s;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    margin: 2px;
  }

  .section-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 4px 0;
  }

  .placeholder-detail {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    gap: 8px;
  }
  .placeholder-detail .hint { font-size: 13px; }
  .placeholder-detail .icon { font-size: 36px; opacity: 0.3; }

  /* Param table */
  .param-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 8px;
  }
  .param-table td {
    padding: 4px 0;
    border-bottom: 1px solid #30363d44;
  }
  .param-table td:last-child {
    text-align: right;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent);
  }

  /* Loop indicator */
  .loop-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .loop-indicator.loop-active {
    color: var(--pink);
    border-color: var(--pink);
    background: #f778ba11;
  }
  .loop-indicator .loop-icon { font-size: 14px; }

  .nano-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <h1><span>FLX</span> Architecture Explorer <span class="nano-badge">Nano ~145M</span></h1>
  <div class="tau-control">
    <label>Thermal τ</label>
    <input type="range" id="tauSlider" min="0" max="100" value="20">
    <div class="tau-val" id="tauValue">0.20</div>
    <div class="tau-regime regime-fast" id="tauRegime">FAST</div>
  </div>
</header>

<div class="main-layout">
  <div class="pipeline" id="pipeline"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="placeholder-detail">
      <div class="icon">⬅</div>
      <div class="hint">Click any component to inspect it.<br>Drag the τ slider to see thermal gating.</div>
    </div>
  </div>
</div>

<script>
const COMPONENTS = {
  input: {
    label: 'Input Tokens',
    sub: 'Raw text / token ids',
    type: 'Entry Point',
    desc: 'Raw token stream entering the model. Text is tokenized before reaching the canonizer.',
    params: '—',
    details: {}
  },
  canonizer: {
    label: 'Canonizer',
    sub: '~2M params · 1 layer',
    type: 'Preprocessing',
    desc: 'Normalizes input representations into the model\'s canonical embedding space. Handles token-level preprocessing the base was trained to expect. Small, fast, rarely needs deltas — the stable entry point.',
    params: '~2M',
    details: { Layers: '1', Role: 'Input normalization', 'Delta Slots': 'Rare' }
  },
  embedder: {
    label: 'Embedder',
    sub: '~15M params · 2 layers',
    type: 'Embedding',
    desc: 'Maps tokens into the compositional embedding space. Optimized for clean delta composition — "directions" in the space remain interpretable across delta stacks. This is the shared coordinate system that makes deltas portable across cortices.',
    params: '~15M',
    details: { Layers: '2', d_model: '512', Heads: '8', Role: 'Shared coordinate system' }
  },
  thermal: {
    label: 'Thermal Estimator (τ)',
    sub: '~0.5M params',
    type: 'Control Signal',
    desc: 'A small learned network that computes τ from input surprise + context novelty + thermal history. τ is a differentiable arousal signal in (0,1) that broadcasts to every gate in the model: strata thresholds, bridge bandwidths, memory triggers, loop counts. Trained end-to-end in Phase 2.',
    params: '~0.5M',
    details: {
      'Inputs': 'surprise + context novelty + history',
      'Output': 'scalar τ ∈ (0, 1)',
      'Trained': 'Phase 2 (frozen cortex bases)',
    }
  },
  router: {
    label: 'Thalamic Router',
    sub: '~2M params · 1 layer',
    type: 'Routing',
    desc: 'Like the brain\'s thalamus — classifies which domains the input needs and dispatches via multi-hot scores. "Solve this word problem" → math=0.9, language=0.7. Also estimates input difficulty for strata depth. Trained in Phase 0 with diversity pressure.',
    params: '~2M',
    details: { 'Output': 'Multi-hot domain scores', 'Threshold': '> 0.2 to activate cortex', 'Trained': 'Phase 0' }
  },
  cortices: {
    label: 'Domain Cortices',
    sub: '5 × ~20M params each',
    type: 'Core Processing',
    isCortexRow: true,
  },
  bridges: {
    label: 'Cross-Cortical Bridges',
    sub: '~5M params · 10 pairs',
    type: 'Inter-domain Communication',
    desc: 'Learned linear projections with bandwidth gates between cortex pairs. At low τ, bridges are quiet — cortices work independently. At high τ, bridges open for multi-domain reasoning. Each bridge has a learned compatibility score.',
    params: '~5M',
    tauMin: 0.3,
    details: { 'Pairs': '10 (all cortex combos)', 'τ gate': '> 0.3', 'Bandwidth': 'Learned per pair' }
  },
  merger: {
    label: 'Cortex Merger',
    sub: '~3M params · 1 layer',
    type: 'Aggregation',
    desc: 'Combines all active cortex outputs, weighted by the router\'s domain scores. Pure-math input → 90% Math, 10% Language. Also applies a learned residual gate to preserve information from the embedder.',
    params: '~3M',
    details: { 'Weighting': 'Router domain scores', 'Residual': 'Learned gate from embedder' }
  },
  memory: {
    label: 'Memory Controller',
    sub: '~10M params · 2 layers',
    type: 'Episodic Memory',
    desc: 'Reads from episodic buffer (compressed past sessions) and working memory (current KV cache). When τ > 0.5, retrieves relevant episode vectors. When τ > 0.7, loops back through the cortex merger for refinement (max 3 loops).',
    params: '~10M',
    tauMin: 0.5,
    loopTauMin: 0.7,
    details: {
      'Retrieval gate': 'τ > 0.5',
      'Loop gate': 'τ > 0.7',
      'Max loops': '3',
      'Episode size': '256 floats (~512 bytes)',
    }
  },
  decoder: {
    label: 'Decoder → Logits',
    sub: '~8M params · 1 layer',
    type: 'Output',
    desc: 'Final projection to vocabulary logits. Relatively simple — the expressive work happens upstream in the cortices. Decoder deltas are rare and typically capture output-format preferences (code formatting, citation style).',
    params: '~8M',
    details: { 'Output': 'Vocabulary logits', 'Delta Slots': 'Rare (formatting only)' }
  },
  output: {
    label: 'Output',
    sub: 'Generated tokens',
    type: 'Exit Point',
    desc: 'Final token predictions sampled from the logit distribution.',
    params: '—',
    details: {}
  },
};

const CORTEX_LIST = [
  { id: 'language', name: 'Language', color: '#58a6ff', exampleScore: 0.7 },
  { id: 'math',     name: 'Math',     color: '#3fb950', exampleScore: 0.9 },
  { id: 'code',     name: 'Code',     color: '#d29922', exampleScore: 0.2 },
  { id: 'science',  name: 'Science',  color: '#bc8cff', exampleScore: 0.15 },
  { id: 'reasoning',name: 'Reasoning',color: '#f778ba', exampleScore: 0.6 },
];

const STRATA = [
  { name: 'Basic',        tauMin: 0.0,  conf: 1.0,  cls: 's-basic',        color: '#3fb950' },
  { name: 'Intermediate', tauMin: 0.25, conf: 0.7,  cls: 's-intermediate', color: '#58a6ff' },
  { name: 'Expert',       tauMin: 0.5,  conf: 0.5,  cls: 's-expert',       color: '#d29922' },
  { name: 'Frontier',     tauMin: 0.7,  conf: 0.3,  cls: 's-frontier',     color: '#f85149' },
];

const CORTEX_DETAIL = {
  desc: 'Specialized sub-network for this knowledge domain. Contains 4 hierarchical strata (basic → frontier) each with their own delta stacks. Cortices don\'t share weight space — deltas in one cortex never interfere with another.',
  params: '~20M',
  layers: '8 (2 per stratum)',
  deltaSlots: '12 (3 per stratum)',
};

let tau = 0.2;
let selectedId = null;
let selectedCortex = null;

// ── Build pipeline ──
function buildPipeline() {
  const pipeline = document.getElementById('pipeline');
  pipeline.innerHTML = '';
  const order = ['input','canonizer','embedder','thermal','router','cortices','bridges','merger','memory','decoder','output'];

  order.forEach((id, i) => {
    const comp = COMPONENTS[id];
    if (id === 'cortices') {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = 'DOMAIN CORTICES (4 strata each)';
      pipeline.appendChild(lbl);

      const row = document.createElement('div');
      row.className = 'cortex-row';
      row.id = 'cortexRow';
      CORTEX_LIST.forEach(c => {
        const el = document.createElement('div');
        el.className = 'cortex-node';
        el.id = 'cortex-' + c.id;
        el.innerHTML = `
          <div class="cortex-name">${c.name}</div>
          <div class="cortex-score" id="score-${c.id}">score: ${c.exampleScore.toFixed(2)}</div>
          <div class="strata-bar">
            ${STRATA.map(s => `<div class="s ${s.cls}" id="sb-${c.id}-${s.name}" style="opacity:${tau >= s.tauMin ? 1 : 0.15}"></div>`).join('')}
          </div>
        `;
        el.onclick = (e) => { e.stopPropagation(); selectCortex(c.id); };
        row.appendChild(el);
      });
      pipeline.appendChild(row);
    } else if (id === 'bridges') {
      const active = tau >= 0.3;
      const el = document.createElement('div');
      el.className = 'bridge-row' + (active ? ' active-bridge' : ' inactive');
      el.id = 'node-bridges';
      el.innerHTML = `<span>⇌</span> Cross-Cortical Bridges (10 pairs) — ${active ? 'ACTIVE' : 'inactive'} <span style="margin-left:auto;font-size:10px">τ ≥ 0.3</span>`;
      el.onclick = () => selectNode('bridges');
      pipeline.appendChild(el);
    } else if (id === 'memory') {
      // Loop indicator
      const loopActive = tau >= 0.7;
      const loopEl = document.createElement('div');
      loopEl.className = 'loop-indicator' + (loopActive ? ' loop-active' : '');
      loopEl.id = 'loopIndicator';
      loopEl.innerHTML = `<span class="loop-icon">↻</span> Refinement Loop (max 3) — ${loopActive ? 'ACTIVE' : 'inactive'} <span style="margin-left:auto;font-size:10px">τ ≥ 0.7</span>`;
      pipeline.appendChild(loopEl);

      // Node
      const node = document.createElement('div');
      node.className = 'node' + (tau >= 0.5 ? ' active-glow' : tau < 0.5 ? ' inactive' : '');
      node.id = 'node-' + id;
      node.innerHTML = `<div class="node-label">${comp.label}</div><div class="node-sub">${comp.sub}</div>`;
      if (comp.tauMin !== undefined) {
        const on = tau >= comp.tauMin;
        node.innerHTML += `<div class="node-badge" style="background:${on ? '#3fb95033;color:#3fb950' : '#f8514933;color:#f85149'}">${on ? 'ON' : 'OFF'} τ≥${comp.tauMin}</div>`;
      }
      node.onclick = () => selectNode(id);
      pipeline.appendChild(node);
    } else {
      const node = document.createElement('div');
      node.className = 'node';
      node.id = 'node-' + id;
      node.innerHTML = `<div class="node-label">${comp.label}</div><div class="node-sub">${comp.sub}</div>`;
      node.onclick = () => selectNode(id);
      pipeline.appendChild(node);
    }

    if (i < order.length - 1 && id !== 'cortices') {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow active';
      pipeline.appendChild(arrow);
    }
    if (id === 'cortices') {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow active';
      pipeline.appendChild(arrow);
    }
  });
}

function selectNode(id) {
  selectedId = id;
  selectedCortex = null;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
  document.querySelectorAll('.cortex-node').forEach(n => n.classList.remove('selected'));
  const el = document.getElementById('node-' + id);
  if (el) el.classList.add('selected');
  renderDetail();
}

function selectCortex(cid) {
  selectedId = 'cortex';
  selectedCortex = cid;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
  document.querySelectorAll('.cortex-node').forEach(n => n.classList.remove('selected'));
  document.getElementById('cortex-' + cid).classList.add('selected');
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');

  if (selectedId === 'cortex' && selectedCortex) {
    const c = CORTEX_LIST.find(x => x.id === selectedCortex);
    panel.innerHTML = `
      <h2 style="color:${c.color}">${c.name} Cortex</h2>
      <div class="detail-type">Domain Cortex</div>
      <p>${CORTEX_DETAIL.desc}</p>

      <div class="detail-section">
        <h3>Parameters</h3>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-val">${CORTEX_DETAIL.params}</div><div class="stat-label">Total Params</div></div>
          <div class="stat-card"><div class="stat-val">${CORTEX_DETAIL.layers}</div><div class="stat-label">Layers</div></div>
          <div class="stat-card"><div class="stat-val">${CORTEX_DETAIL.deltaSlots}</div><div class="stat-label">Delta Slots</div></div>
          <div class="stat-card"><div class="stat-val">512</div><div class="stat-label">d_model</div></div>
        </div>
      </div>

      <div class="detail-section">
        <h3>Strata (τ = ${tau.toFixed(2)})</h3>
        <div class="strata-detail">
          ${STRATA.map(s => {
            const active = tau >= s.tauMin;
            return `<div class="stratum-row ${active ? '' : 'stratum-inactive'}">
              <div class="stratum-dot" style="background:${s.color}"></div>
              <div class="stratum-name">${s.name}</div>
              <div class="stratum-meta">τ≥${s.tauMin} · conf=${s.conf}</div>
              <div style="font-size:10px;color:${active ? '#3fb950' : '#f85149'}">${active ? '● ON' : '○ OFF'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="detail-section">
        <h3>Thermal Response</h3>
        <div class="thermal-strip"><div class="marker" style="left:${tau * 100}%"></div></div>
        <p style="margin-top:8px">At τ=${tau.toFixed(2)}: <strong>${tau < 0.25 ? 'Only basic stratum fires — foundational knowledge only.' : tau < 0.5 ? 'Basic + intermediate strata — standard domain knowledge.' : tau < 0.7 ? 'Expert strata active — specialized knowledge engaged.' : 'All strata including frontier — uncertain/cutting-edge knowledge.'}</strong></p>
      </div>

      <div class="detail-section">
        <h3>Knowledge Examples (${c.name})</h3>
        <table class="param-table">
          ${getKnowledgeExamples(c.id).map(e => `<tr><td>${e[0]}</td><td>${e[1]}</td></tr>`).join('')}
        </table>
      </div>
    `;
    return;
  }

  const comp = COMPONENTS[selectedId];
  if (!comp) {
    panel.innerHTML = `<div class="placeholder-detail"><div class="icon">⬅</div><div class="hint">Click any component to inspect it.<br>Drag the τ slider to see thermal gating.</div></div>`;
    return;
  }

  let extraHTML = '';

  if (selectedId === 'thermal') {
    extraHTML = `
      <div class="detail-section">
        <h3>Current τ Regime</h3>
        <div class="thermal-strip"><div class="marker" style="left:${tau * 100}%"></div></div>
        <table class="param-table" style="margin-top:12px">
          <tr><td>0.0 – 0.3</td><td style="color:${tau < 0.3 ? '#3fb950' : '#8b949e'}">⚡ Fast path</td></tr>
          <tr><td>0.3 – 0.5</td><td style="color:${tau >= 0.3 && tau < 0.5 ? '#58a6ff' : '#8b949e'}">📚 Standard</td></tr>
          <tr><td>0.5 – 0.7</td><td style="color:${tau >= 0.5 && tau < 0.7 ? '#d29922' : '#8b949e'}">🔬 Deep</td></tr>
          <tr><td>0.7 – 1.0</td><td style="color:${tau >= 0.7 ? '#f85149' : '#8b949e'}">🧠 Full depth</td></tr>
        </table>
      </div>
      <div class="detail-section">
        <h3>What τ Gates</h3>
        <table class="param-table">
          <tr><td>Strata activation</td><td>τ ≥ threshold</td></tr>
          <tr><td>Cross-cortical bridges</td><td>τ ≥ 0.3</td></tr>
          <tr><td>Memory retrieval</td><td>τ ≥ 0.5</td></tr>
          <tr><td>Refinement loops</td><td>τ ≥ 0.7</td></tr>
        </table>
      </div>
    `;
  }

  if (selectedId === 'bridges') {
    const bridgeActive = tau >= 0.3;
    const pairs = [
      ['Language ↔ Math', 0.8], ['Language ↔ Code', 0.3], ['Language ↔ Reasoning', 0.7],
      ['Math ↔ Code', 0.6], ['Math ↔ Science', 0.5], ['Math ↔ Reasoning', 0.7],
      ['Code ↔ Science', 0.3], ['Code ↔ Reasoning', 0.5],
      ['Science ↔ Reasoning', 0.6], ['Language ↔ Science', 0.4],
    ];
    extraHTML = `
      <div class="detail-section">
        <h3>Bridge Pairs (τ = ${tau.toFixed(2)})</h3>
        <table class="param-table">
          ${pairs.map(p => `<tr><td>${p[0]}</td><td style="color:${bridgeActive ? '#39d2c0' : '#8b949e'}">bw=${p[1]} ${bridgeActive ? '●' : '○'}</td></tr>`).join('')}
        </table>
      </div>
    `;
  }

  if (selectedId === 'memory') {
    extraHTML = `
      <div class="detail-section">
        <h3>Memory Tiers</h3>
        <table class="param-table">
          <tr><td>Working Memory</td><td>Live KV cache</td></tr>
          <tr><td>Episodic Buffer</td><td>Compressed sessions</td></tr>
          <tr><td>Thermal History</td><td>τ trajectory</td></tr>
        </table>
      </div>
      <div class="detail-section">
        <h3>Episodic Compressor</h3>
        <table class="param-table">
          <tr><td>Params</td><td>~3M</td></tr>
          <tr><td>Episode size</td><td>256 floats (512 bytes)</td></tr>
          <tr><td>1000 sessions</td><td>~500KB</td></tr>
        </table>
      </div>
      <div class="detail-section">
        <h3>Current State</h3>
        <table class="param-table">
          <tr><td>Retrieval</td><td style="color:${tau >= 0.5 ? '#3fb950' : '#f85149'}">${tau >= 0.5 ? '● ACTIVE' : '○ inactive'} (τ≥0.5)</td></tr>
          <tr><td>Loops</td><td style="color:${tau >= 0.7 ? '#3fb950' : '#f85149'}">${tau >= 0.7 ? '● ACTIVE' : '○ inactive'} (τ≥0.7)</td></tr>
        </table>
      </div>
    `;
  }

  if (selectedId === 'router') {
    extraHTML = `
      <div class="detail-section">
        <h3>Example Routing</h3>
        <p style="font-size:12px;color:var(--text-dim)">Input: "Solve this word problem about compound interest"</p>
        <table class="param-table">
          ${CORTEX_LIST.map(c => `<tr><td>${c.name}</td><td>${c.exampleScore.toFixed(2)}</td></tr>`).join('')}
        </table>
      </div>
    `;
  }

  const detailRows = Object.entries(comp.details || {}).map(
    ([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  panel.innerHTML = `
    <h2>${comp.label}</h2>
    <div class="detail-type">${comp.type}</div>
    <p>${comp.desc || ''}</p>
    ${comp.params && comp.params !== '—' ? `
    <div class="detail-section">
      <h3>Specs</h3>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val">${comp.params}</div><div class="stat-label">Parameters</div></div>
      </div>
      ${detailRows ? `<table class="param-table" style="margin-top:12px">${detailRows}</table>` : ''}
    </div>` : (detailRows ? `<div class="detail-section"><table class="param-table">${detailRows}</table></div>` : '')}
    ${extraHTML}
  `;
}

function getKnowledgeExamples(id) {
  const map = {
    language: [['Basic', 'Grammar, vocab, sentence parsing'], ['Intermediate', 'Rhetoric, style, translation'], ['Expert', 'Literary analysis, pragmatics'], ['Frontier', 'Novel idioms, emerging usage']],
    math: [['Basic', 'Arithmetic, basic algebra'], ['Intermediate', 'Calculus, linear algebra, stats'], ['Expert', 'Abstract algebra, topology'], ['Frontier', 'Novel proofs, conjectures']],
    code: [['Basic', 'Syntax, simple patterns'], ['Intermediate', 'Design patterns, APIs'], ['Expert', 'Systems design, optimization'], ['Frontier', 'Novel architectures, edge cases']],
    science: [['Basic', 'Fundamental laws, definitions'], ['Intermediate', 'Applied sciences, methods'], ['Expert', 'Research-level knowledge'], ['Frontier', 'Emerging findings, hypotheses']],
    reasoning: [['Basic', 'Simple logic, deduction'], ['Intermediate', 'Multi-step reasoning'], ['Expert', 'Abstract/formal reasoning'], ['Frontier', 'Novel inference strategies']],
  };
  return map[id] || [];
}

function updateTau(val) {
  tau = val / 100;
  document.getElementById('tauValue').textContent = tau.toFixed(2);

  // Update tau color
  const tauEl = document.getElementById('tauValue');
  if (tau < 0.3) { tauEl.style.color = '#3fb950'; }
  else if (tau < 0.5) { tauEl.style.color = '#58a6ff'; }
  else if (tau < 0.7) { tauEl.style.color = '#d29922'; }
  else { tauEl.style.color = '#f85149'; }

  // Regime badge
  const badge = document.getElementById('tauRegime');
  if (tau < 0.3) { badge.textContent = 'FAST'; badge.className = 'tau-regime regime-fast'; }
  else if (tau < 0.5) { badge.textContent = 'STANDARD'; badge.className = 'tau-regime regime-standard'; }
  else if (tau < 0.7) { badge.textContent = 'DEEP'; badge.className = 'tau-regime regime-deep'; }
  else { badge.textContent = 'FULL DEPTH'; badge.className = 'tau-regime regime-full'; }

  // Slider track gradient
  const slider = document.getElementById('tauSlider');
  const pct = val;
  slider.style.background = `linear-gradient(90deg, #3fb950 0%, #58a6ff 30%, #d29922 50%, #f85149 70%, #f85149 ${pct}%, #30363d ${pct}%, #30363d 100%)`;

  // Update strata bars
  CORTEX_LIST.forEach(c => {
    const cortexEl = document.getElementById('cortex-' + c.id);
    const active = c.exampleScore > 0.2;
    cortexEl.className = 'cortex-node' + (!active ? ' inactive' : '') + (selectedCortex === c.id ? ' selected' : '');
    STRATA.forEach(s => {
      const bar = document.getElementById('sb-' + c.id + '-' + s.name);
      if (bar) bar.style.opacity = (tau >= s.tauMin && active) ? 1 : 0.15;
    });
  });

  // Bridges
  const bridgeEl = document.getElementById('node-bridges');
  if (bridgeEl) {
    const on = tau >= 0.3;
    bridgeEl.className = 'bridge-row' + (on ? ' active-bridge' : ' inactive');
    bridgeEl.innerHTML = `<span>⇌</span> Cross-Cortical Bridges (10 pairs) — ${on ? 'ACTIVE' : 'inactive'} <span style="margin-left:auto;font-size:10px">τ ≥ 0.3</span>`;
    bridgeEl.onclick = () => selectNode('bridges');
  }

  // Memory node
  const memNode = document.getElementById('node-memory');
  if (memNode) {
    const on = tau >= 0.5;
    memNode.className = 'node' + (on ? ' active-glow' : ' inactive') + (selectedId === 'memory' ? ' selected' : '');
    const badge = memNode.querySelector('.node-badge');
    if (badge) {
      badge.style.background = on ? '#3fb95033' : '#f8514933';
      badge.style.color = on ? '#3fb950' : '#f85149';
      badge.textContent = (on ? 'ON' : 'OFF') + ' τ≥0.5';
    }
  }

  // Loop indicator
  const loopEl = document.getElementById('loopIndicator');
  if (loopEl) {
    const on = tau >= 0.7;
    loopEl.className = 'loop-indicator' + (on ? ' loop-active' : '');
    loopEl.innerHTML = `<span class="loop-icon">↻</span> Refinement Loop (max 3) — ${on ? 'ACTIVE' : 'inactive'} <span style="margin-left:auto;font-size:10px">τ ≥ 0.7</span>`;
  }

  // Refresh detail if showing
  if (selectedId || selectedCortex) renderDetail();
}

// ── Init ──
buildPipeline();
document.getElementById('tauSlider').addEventListener('input', e => updateTau(e.target.value));
updateTau(20);
</script>
</body>
</html>
